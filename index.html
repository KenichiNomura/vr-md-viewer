<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD Trajectory VR Viewer</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; background: #111; }
      #app { width: 100vw; height: 100vh; }
      #ui {
        position: absolute; top: 0; left: 0; z-index: 10;
        font-family: system-ui, sans-serif; color: #eee;
        background: rgba(20,20,20,0.85); padding: 12px 16px;
        border-radius: 0 0 8px 0; max-width: 360px;
        max-height: calc(100vh - 24px); overflow-y: auto;
        box-sizing: border-box;
      }
      .panelHeader { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      #ui h1 { font-size: 14px; margin: 0; font-weight: 600; }
      #controlsContent { margin-top: 8px; }
      #toggleControlsBtn {
        flex: 0 0 auto; margin: 0 !important; padding: 2px 8px;
        color: #eee; background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.22); border-radius: 4px;
      }
      #ui.collapsed #controlsContent { display: none; }
      #ui label { display: block; font-size: 12px; margin: 6px 0 2px; }
      #ui input[type="file"] { font-size: 12px; }
      #ui input[type="text"] { width: 100%; box-sizing: border-box; font-size: 12px; margin-top: 4px; }
      #ui select { width: 100%; box-sizing: border-box; font-size: 12px; margin-top: 4px; }
      #ui input[type="range"] { width: 100%; }
      #ui button { margin-right: 6px; margin-top: 4px; font-size: 12px; cursor: pointer; }
      #status { font-size: 11px; opacity: 0.8; margin-top: 6px; white-space: pre-line; }
      #vrEntry {
        position: fixed; top: 12px; right: 16px; z-index: 20;
        margin: 0; pointer-events: auto;
      }
      #vrEntry button, #vrEntry a {
        position: static !important; top: auto !important; right: auto !important;
        bottom: auto !important; left: auto !important; margin: 0 !important;
      }
      .panelDivider { border-top: 1px solid rgba(255,255,255,0.16); margin-top: 10px; padding-top: 8px; }
      .row { display: flex; gap: 6px; align-items: center; }
      .row input[type="text"] { flex: 1; min-width: 0; }
      .row button { flex: 0 0 auto; }
      #roomLink { opacity: 0.82; }
      #collabStatus { font-size: 11px; opacity: 0.82; margin-top: 6px; white-space: pre-line; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui">
      <div class="panelHeader">
        <h1>MD Trajectory VR Viewer</h1>
        <button id="toggleControlsBtn" type="button" aria-controls="controlsContent" aria-expanded="true">Hide</button>
      </div>
      <div id="controlsContent">
        <label for="fileInput">Load extended XYZ file (or drag &amp; drop anywhere)</label>
        <input id="fileInput" type="file" />
        <label for="urlInput" style="margin-top:8px">Or load from a URL</label>
        <input id="urlInput" type="text" placeholder="https://.../trajectory.xyz" value="https://kenichinomura.github.io/vr-md-viewer/samples/tobe.xyz" />
        <button id="loadUrlBtn" style="margin-top:4px">Load URL</button>
        <label for="backgroundSelect" style="margin-top:8px">Background</label>
        <select id="backgroundSelect"></select>
        <div id="playback" style="display:none">
          <label>Frame: <span id="frameLabel">0 / 0</span></label>
          <input id="frameSlider" type="range" min="0" max="0" value="0" />
          <div>
            <button id="playBtn">Play</button>
            <button id="stepBack">&lt;</button>
            <button id="stepFwd">&gt;</button>
            <label style="display:inline-block;margin-left:8px;">FPS
              <input id="fpsInput" type="number" min="1" max="60" value="15" style="width:48px" />
            </label>
          </div>
        </div>
        <div id="collaboration" class="panelDivider">
          <label for="roomInput">Room</label>
          <div class="row">
            <input id="roomInput" type="text" spellcheck="false" />
            <button id="joinRoomBtn">Join</button>
            <button id="leaveRoomBtn" disabled>Leave</button>
          </div>
          <label for="userNameInput">Name</label>
          <input id="userNameInput" type="text" spellcheck="false" />
          <label for="serverInput">Room server</label>
          <input id="serverInput" type="text" spellcheck="false" />
          <label for="roomLink">Share</label>
          <div class="row">
            <input id="roomLink" type="text" readonly placeholder="Join a room" />
            <button id="copyRoomLinkBtn" disabled>Copy</button>
          </div>
          <div>
            <button id="takePresenterBtn" disabled>Take Presenter</button>
          </div>
          <div id="collabStatus">Offline</div>
        </div>
        <div id="status"></div>
      </div>
    </div>
    <div id="vrEntry"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
