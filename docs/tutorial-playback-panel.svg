<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Playback panel controls</title>
  <desc id="desc">Clean annotated schematic of the GEARS XR playback panel for frame, play, step, and FPS controls.</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0b1220" flood-opacity="0.16"/></filter>
    <style>
      .page { fill: #f5f7fb; }
      .mock { fill: #151b24; stroke: #d6dde8; stroke-width: 2; filter: url(#shadow); }
      .label { fill: #dce5f2; font: 800 18px system-ui, sans-serif; }
      .muted { fill: #93a4b8; font: 14px system-ui, sans-serif; }
      .field { fill: #0b1119; stroke: #657890; stroke-width: 1.5; }
      .button { fill: #263244; stroke: #7f92aa; stroke-width: 1.5; }
      .buttonText { fill: #f8fafc; font: 800 15px system-ui, sans-serif; }
      .badge { fill: #22b8ff; stroke: #ffffff; stroke-width: 3; }
      .badgeText { fill: white; font: 800 18px system-ui, sans-serif; text-anchor: middle; dominant-baseline: central; }
      .legendCard { fill: #ffffff; stroke: #d8e0ea; stroke-width: 1.5; filter: url(#shadow); }
      .legendTitle { fill: #0f172a; font: 800 18px system-ui, sans-serif; }
      .legendText { fill: #536273; font: 14px system-ui, sans-serif; }
      .accent { fill: #22b8ff; }
    </style>
  </defs>
  <rect class="page" width="1100" height="560"/>
  <text x="54" y="62" fill="#0f172a" font="800 28px system-ui, sans-serif">Playback panel: inspect frames</text>
  <text x="54" y="88" fill="#64748b" font="16px system-ui, sans-serif">The panel appears at the bottom-left after an XYZ trajectory is loaded.</text>

  <g transform="translate(74 166)">
    <rect class="mock" width="500" height="154" rx="18"/>
    <text class="label" x="28" y="42">Frame: 42 / 120</text>
    <rect class="field" x="28" y="62" width="444" height="18" rx="9"/>
    <rect x="28" y="62" width="176" height="18" rx="9" fill="#135a7a"/>
    <circle class="accent" cx="204" cy="71" r="16"/>
    <circle class="badge" cx="28" cy="60" r="18"/><text class="badgeText" x="28" y="61">1</text>

    <rect class="button" x="28" y="104" width="68" height="34" rx="7"/>
    <text class="buttonText" x="45" y="126">Play</text>
    <circle class="badge" cx="28" cy="105" r="18"/><text class="badgeText" x="28" y="106">2</text>

    <rect class="button" x="116" y="104" width="56" height="34" rx="7"/>
    <text class="buttonText" x="130" y="126">Prev</text>
    <rect class="button" x="184" y="104" width="56" height="34" rx="7"/>
    <text class="buttonText" x="199" y="126">Next</text>
    <circle class="badge" cx="116" cy="105" r="18"/><text class="badgeText" x="116" y="106">3</text>

    <text class="label" x="276" y="127">FPS</text>
    <rect class="field" x="322" y="102" width="66" height="38" rx="7"/>
    <text class="muted" x="346" y="126">15</text>
    <circle class="badge" cx="322" cy="104" r="18"/><text class="badgeText" x="322" y="105">4</text>
  </g>

  <g transform="translate(642 130)">
    <rect class="legendCard" width="384" height="250" rx="18"/>
    <text class="legendTitle" x="30" y="42">Button guide</text>
    <g transform="translate(30 76)">
      <circle class="badge" cx="16" cy="16" r="16"/><text class="badgeText" x="16" y="17">1</text>
      <text class="legendTitle" x="48" y="14">Frame slider</text>
      <text class="legendText" x="48" y="38">Drag to jump to any trajectory frame.</text>
    </g>
    <g transform="translate(30 132)">
      <circle class="badge" cx="16" cy="16" r="16"/><text class="badgeText" x="16" y="17">2</text>
      <text class="legendTitle" x="48" y="14">Play / Pause</text>
      <text class="legendText" x="48" y="38">Start or stop automatic playback.</text>
    </g>
    <g transform="translate(30 188)">
      <circle class="badge" cx="16" cy="16" r="16"/><text class="badgeText" x="16" y="17">3</text>
      <text class="legendTitle" x="48" y="14">Prev / Next</text>
      <text class="legendText" x="48" y="38">Step exactly one frame.</text>
    </g>
    <g transform="translate(214 188)">
      <circle class="badge" cx="16" cy="16" r="16"/><text class="badgeText" x="16" y="17">4</text>
      <text class="legendTitle" x="48" y="14">FPS</text>
      <text class="legendText" x="48" y="38">Type playback speed.</text>
    </g>
  </g>
</svg>
