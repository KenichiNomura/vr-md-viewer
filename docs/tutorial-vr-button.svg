<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">VR entry and measurement controls</title>
  <desc id="desc">Clean schematic showing Enter VR, desktop atom measurement, VR grab/scale, and atom selection for measurements.</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0b1220" flood-opacity="0.16"/></filter>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#08131f"/><stop offset="1" stop-color="#05070c"/></linearGradient>
    <style>
      .page { fill: #f5f7fb; }
      .screen { fill: url(#screen); stroke: #d6dde8; stroke-width: 2; filter: url(#shadow); }
      .button { fill: #f8fafc; stroke: #7f92aa; stroke-width: 1.5; }
      .buttonText { fill: #162033; font: 800 16px system-ui, sans-serif; }
      .label { fill: #f8fafc; font: 800 18px system-ui, sans-serif; }
      .muted { fill: #93a4b8; font: 14px system-ui, sans-serif; }
      .badge { fill: #22b8ff; stroke: #ffffff; stroke-width: 3; }
      .badgeText { fill: white; font: 800 18px system-ui, sans-serif; text-anchor: middle; dominant-baseline: central; }
      .legendCard { fill: #ffffff; stroke: #d8e0ea; stroke-width: 1.5; filter: url(#shadow); }
      .legendTitle { fill: #0f172a; font: 800 18px system-ui, sans-serif; }
      .legendText { fill: #536273; font: 14px system-ui, sans-serif; }
      .atomBond { stroke: #dce4ef; stroke-width: 8; stroke-linecap: round; }
      .ray { stroke: #22b8ff; stroke-width: 3; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect class="page" width="1100" height="560"/>
  <text x="54" y="62" fill="#0f172a" font="800 28px system-ui, sans-serif">VR and measurements</text>
  <text x="54" y="88" fill="#64748b" font="16px system-ui, sans-serif">Use the top-right VR button for headset mode, and select atoms for distance or angle readouts.</text>

  <g transform="translate(70 128)">
    <rect class="screen" width="520" height="330" rx="22"/>
    <rect class="button" x="372" y="26" width="112" height="42" rx="7"/>
    <text class="buttonText" x="402" y="53">Enter VR</text>
    <circle class="badge" cx="366" cy="28" r="18"/><text class="badgeText" x="366" y="29">1</text>

    <g transform="translate(228 172)">
      <circle cx="0" cy="0" r="110" fill="#07111d" stroke="#1bbfe8" stroke-width="2"/>
      <line class="atomBond" x1="-58" y1="-16" x2="-4" y2="34"/>
      <line class="atomBond" x1="-4" y1="34" x2="58" y2="0"/>
      <line class="atomBond" x1="-4" y1="34" x2="24" y2="80"/>
      <circle cx="-58" cy="-16" r="26" fill="#ff4d5a"/>
      <circle cx="-4" cy="34" r="34" fill="#9aa4b2"/>
      <circle cx="58" cy="0" r="22" fill="#ffd54f"/>
      <circle cx="24" cy="80" r="18" fill="#ffffff"/>
      <circle class="badge" cx="-74" cy="-42" r="18"/><text class="badgeText" x="-74" y="-41">2</text>
      <circle class="badge" cx="86" cy="-20" r="18"/><text class="badgeText" x="86" y="-19">3</text>
    </g>
    <path class="ray" d="M72 246 C118 214, 146 184, 172 140"/>
      <text class="label" x="32" y="274">click atoms</text>
  </g>

  <g transform="translate(648 128)">
    <rect class="legendCard" width="384" height="330" rx="18"/>
    <text class="legendTitle" x="30" y="42">Interaction guide</text>
    <g transform="translate(30 78)">
      <circle class="badge" cx="16" cy="16" r="16"/><text class="badgeText" x="16" y="17">1</text>
      <text class="legendTitle" x="48" y="14">Enter VR</text>
      <text class="legendText" x="48" y="38">Requires HTTPS and WebXR support.</text>
    </g>
    <g transform="translate(30 150)">
      <circle class="badge" cx="16" cy="16" r="16"/><text class="badgeText" x="16" y="17">2</text>
      <text class="legendTitle" x="48" y="14">Measure atoms</text>
      <text class="legendText" x="48" y="38">Desktop: click. VR: select atoms.</text>
    </g>
    <g transform="translate(30 222)">
      <circle class="badge" cx="16" cy="16" r="16"/><text class="badgeText" x="16" y="17">3</text>
      <text class="legendTitle" x="48" y="14">Move and scale</text>
      <text class="legendText" x="48" y="38">Grab with controllers; two hands scale.</text>
    </g>
  </g>
</svg>
