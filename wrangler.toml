name = "vr-md-viewer-room"
main = "worker/src/index.ts"
compatibility_date = "2025-07-18"

[vars]
ALLOWED_ORIGINS = "http://localhost:5174,http://127.0.0.1:5174,http://192.168.1.3:5174,http://192.168.86.154:5174,https://localhost:5173,https://127.0.0.1:5173,https://192.168.1.3:5173,https://192.168.86.154:5173,https://kenichinomura.github.io"
MAX_ROOM_USERS = "6"
MAX_MESSAGE_BYTES = "8192"
MAX_MESSAGES_PER_10_SECONDS = "240"

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "RoomDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]
